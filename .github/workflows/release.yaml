name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  update-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # only the tagged commit is needed

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Unexpected tag format: '$TAG'. Expected vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

      - name: Update floating tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          MINOR="${TAG%.*}"
          MAJOR="${MINOR%.*}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for FLOATING in "$MAJOR" "$MINOR"; do
            git tag -fa "$FLOATING" -m "Update $FLOATING -> $TAG"
            git push origin "$FLOATING" --force
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping creation"
            exit 0
          fi

          # Determine whether this tag is the latest release across all versions.
          # Fetch all release tags, sort by semver, and check if TAG comes out on top.
          LATEST_TAG=$(gh release list --json tagName --jq '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          # Compare versions using sort -V: if TAG is greater than LATEST_TAG, mark as latest.
          if [ -z "$LATEST_TAG" ] || [ "$(printf '%s\n' "$LATEST_TAG" "$TAG" | sort -V | tail -n1)" = "$TAG" ]; then
            IS_LATEST=true
          else
            IS_LATEST=false
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest="$IS_LATEST"
